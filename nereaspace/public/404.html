<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Nerea Espacio</title>
    <script>
      // Redirige rutas SPA a index.html preservando el path
      var base = '/nerea-espacio';
      var path = window.location.pathname.replace(base, '') || '/';
      var search = window.location.search;
      var hash = window.location.hash;
      sessionStorage.setItem('spa_redirect', path + search + hash);
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
